version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      - APP_KEY=base64:7vF+T/W2o7TfP7P7P7P7P7P7P7P7P7P7P7P7P7P7P7A=
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ecommerce
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=ecommerce
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3307:3306"
